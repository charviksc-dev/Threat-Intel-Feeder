apiVersion: apps/v1
kind: Deployment
metadata:
  name: neev-api
  namespace: neev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neev-api
  template:
    metadata:
      labels:
        app: neev-api
    spec:
      containers:
        - name: neev-api
          image: neev-tip-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: neev-config
            - secretRef:
                name: neev-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: neev-api
  namespace: neev
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: neev-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neev-api-hpa
  namespace: neev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neev-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
