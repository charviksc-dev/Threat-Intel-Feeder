apiVersion: v1
kind: Secret
metadata:
  name: neev-secrets
  namespace: neev
type: Opaque
stringData:
  # IMPORTANT: Replace these values before applying to production!
  SECRET_KEY: "CHANGE-ME-generate-with-python-secrets-token-urlsafe-64"
  POSTGRES_PASSWORD: "CHANGE-ME-strong-password-here"
  THEHIVE_API_KEY: "YOUR_THEHIVE_API_KEY"
  CORTEX_API_KEY: "YOUR_CORTEX_API_KEY"
  OTX_API_KEY: "YOUR_OTX_API_KEY"
  VIRUSTOTAL_API_KEY: "YOUR_VIRUSTOTAL_API_KEY"
  WEBHOOK_AUTH_TOKEN: "CHANGE-ME-generate-webhook-token"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neev-config
  namespace: neev
data:
  APP_ENV: "production"
  ELASTICSEARCH_HOST: "http://elasticsearch:9200"
  ELASTICSEARCH_INDEX: "neeve-indicators"
  REDIS_URL: "redis://redis:6379/0"
  POSTGRES_DSN: "postgresql://neev:$(POSTGRES_PASSWORD)@postgres:5432/neev"
  THEHIVE_URL: "http://thehive:9000"
  CORTEX_URL: "http://cortex:9001"
  ALLOWED_ORIGINS: "https://tip.yourdomain.com"
  JWT_ISSUER: "neev-tip"
  RATE_LIMIT_PER_MINUTE: "60"
