apiVersion: apps/v1
kind: Deployment
metadata:
  name: neev-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neev-worker
  template:
    metadata:
      labels:
        app: neev-worker
    spec:
      containers:
        - name: neev-worker
          image: neev-tip-worker:latest
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
            - name: ELASTICSEARCH_HOST
              value: http://elasticsearch:9200
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
